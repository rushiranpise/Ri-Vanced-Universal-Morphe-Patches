name: Push strings

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - patches/src/main/resources/addresources/values/strings.xml

jobs:
  push:
    name: Push strings
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check Crowdin configuration
        id: crowdin
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
        run: |
          if [ -n "$CROWDIN_PROJECT_ID" ] && [ -n "$CROWDIN_PERSONAL_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Crowdin secrets are not configured. Skipping string upload."
          fi

      - name: Process strings
        if: steps.crowdin.outputs.configured == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew processStringsForCrowdin

      - name: Push strings
        if: steps.crowdin.outputs.configured == 'true'
        uses: crowdin/github-action@v2
        with:
          config: crowdin.yml
          upload_sources: true
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
