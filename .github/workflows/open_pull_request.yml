name: Open a PR to main

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Branch to merge from"
        required: false
        default: "dev"
      target_branch:
        description: "Branch to merge into"
        required: false
        default: "main"

permissions:
  pull-requests: write
  contents: read

jobs:
  pull-request:
    name: Open pull request
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_BRANCH: ${{ inputs.source_branch || 'dev' }}
          TARGET_BRANCH: ${{ inputs.target_branch || 'main' }}
        run: |
          set -euo pipefail

          # Check whether GitHub can compare the two branches.
          # In clean/template-derived repos, main and dev may be unrelated until
          # the branch history is aligned. That is not a CI failure.
          if ! COMPARE_JSON="$(gh api "repos/${{ github.repository }}/compare/${TARGET_BRANCH}...${SOURCE_BRANCH}" 2>/tmp/compare-error.txt)"; then
            echo "Could not compare $TARGET_BRANCH...$SOURCE_BRANCH."
            cat /tmp/compare-error.txt
            echo "Skipping PR creation. Align the branch histories first, or run this workflow with comparable branches."
            exit 0
          fi

          COMMITS="$(echo "$COMPARE_JSON" | jq '.total_commits')"
          if [ "$COMMITS" -eq 0 ]; then
            echo "No commits between $TARGET_BRANCH and $SOURCE_BRANCH. Skipping PR creation."
            exit 0
          fi

          # Check if PR already exists.
          if gh pr list --base "$TARGET_BRANCH" --head "$SOURCE_BRANCH" --json number | jq -e '. | length > 0' >/dev/null; then
            echo "Pull request already exists."
            exit 0
          fi

          # Try to create the PR
          gh pr create \
            --base "$TARGET_BRANCH" \
            --head "$SOURCE_BRANCH" \
            --title 'chore: Merge branch `dev` to `main`' \
            --body "When dev (pre-release) is ready, then merge this pull request to create a new stable release." \
            || {
              echo "::error::Pull request creation failed. Ensure 'Allow GitHub Actions to create and approve pull requests' is enabled in the repo Settings > Actions > General > Workflow permissions"
              exit 1
            }
